<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Sign In | {appName}</title>
    <link rel="icon" href="/assets/images/Favicon.svg" type="image/svg+xml" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=visibility,visibility_off"
    />
    <link rel="stylesheet" href="/css/styling.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background-color: var(--bg-body);
      }

      .container {
        width: 100%;
        max-width: 550px;
      }

      .signup-card {
        width: 100%;
        max-width: 400px;
        border-radius: 20px;
        overflow: hidden;
        animation: fadeInUp 0.5s ease-out;
        transition: background 0.3s ease;
        margin: 0 auto;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-header {
        padding: 10px 0 20px;
        text-align: center;
        color: var(--text-primary);
      }
      .card-header h1 {
        font-size: 30px;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .card-header p {
        font-size: 15px;
        opacity: 0.9;
        color: var(--text-secondary);
      }

      .card-content {
        padding: 10px 10px 10px;
      }

      /* Floating label */
      .float-field {
        position: relative;
        margin-bottom: 16px;
      }

      .float-field input {
        width: 100%;
        height: 54px;
        padding: 0 44px 0 23px;
        background: transparent;
        border: 1px solid var(--border-input);
        border-radius: 30px;
        font-size: 15px;
        color: var(--text-primary);
        outline: none;
        transition:
          border-color 0.25s,
          box-shadow 0.25s;
        font-family: inherit;
        box-sizing: border-box;
      }
      .float-field input::placeholder {
        color: transparent;
      }
      .float-field input:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 3px rgba(44, 123, 229, 0.12);
      }
      .float-field input.error {
        border-color: var(--accent-red);
        box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.12);
      }

      /* Label: default di tengah */
      .float-field label {
        position: absolute;
        left: 23px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 15px;
        color: var(--text-muted);
        pointer-events: none;
        background: transparent;
        padding: 0 4px;
        border-radius: 3px;
        transition: all 0.18s ease;
        white-space: nowrap;
      }

      /* Label naik saat fokus atau ada isi */
      .float-field input:focus ~ label,
      .float-field input:not(:placeholder-shown) ~ label {
        top: 0;
        transform: translateY(-50%);
        font-size: 12px;
        background: var(--bg-body);
      }
      .float-field input:focus ~ label {
        color: var(--accent-blue);
      }
      .float-field input.error ~ label {
        color: var(--accent-red);
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        margin: 20px 0;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 2px;
        background: var(--divider);
      }
      .divider span {
        padding: 0 14px;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }
      .shake {
        animation: shake 0.3s ease;
      }

      /* OTP single input */
      .otp-inputs {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 8px;
      }
      .otp-single-label {
        font-size: 12px;
        color: var(--text-muted);
        padding-left: 6px;
      }
      .otp-single-input {
        width: 100%;
        height: 54px;
        padding: 12px 23px;
        background: transparent;
        border: 1px solid var(--border-input);
        border-radius: 30px;
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
        outline: none;
        letter-spacing: 8px;
        font-family: inherit;
        transition:
          border-color 0.25s,
          box-shadow 0.25s;
        box-sizing: border-box;
      }
      .otp-single-input:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 3px rgba(44, 123, 229, 0.12);
      }
      .otp-single-input.error {
        border-color: var(--accent-red);
        box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.12);
      }

      /* Resend row */
      .resend-row {
        text-align: center;
        margin-top: 14px;
        font-size: 13px;
        color: var(--text-muted);
        border-top: 1px solid var(--divider);
        padding-top: 14px;
      }
      .resend-row a {
        color: var(--accent-blue);
        text-decoration: none;
        font-weight: 500;
      }
      .resend-row a:hover {
        text-decoration: underline;
      }

      /* Email clear button */
      .email-clear-btn {
        position: absolute;
        right: 25px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        color: var(--text-muted);
        display: none;
        align-items: center;
        justify-content: center;
        line-height: 0;
        opacity: 0.6;
        transition:
          opacity 0.2s,
          color 0.2s;
        z-index: 2;
      }
      .email-clear-btn:hover {
        opacity: 1;
        color: var(--text-primary);
      }
      .email-clear-btn.visible {
        display: flex;
      }

      .brand-mobile {
        display: none;
      }

      @media (max-width: 767px) {
        html body .brand-top#brandTop {
          display: none !important;
          visibility: hidden !important;
        }
        .brand-mobile {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          margin-bottom: 16px;
        }
        .card-header h1 {
          font-size: 24px;
        }
        .card-header p {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <div id="toastMsg" class="toast-msg" role="status" aria-live="polite"></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span id="themeIcon" class="darkmode-icon"></span>
    </button>

    <div class="brand-top" id="brandTop">
      <div class="brand-logo"></div>
      <span class="brand-top-name" data-placeholder="app_name">Loading...</span>
    </div>

    <div class="container">
      <div class="signup-card">
        <!-- ── BRAND MOBILE ── -->
        <div class="brand-mobile">
          <div class="brand-logo"></div>
          <span class="brand-top-name" data-placeholder="app_name"
            >Loading...</span
          >
        </div>

        <!-- ══════════════════════════════════════════════
             PANEL 1: EMAIL
        ══════════════════════════════════════════════ -->
        <!-- <div id="emailPanel" style="display: none"> -->
        <div id="emailPanel">
          <div class="card-header">
            <h1>Create or sign in</h1>
            <p>Enter your email to continue</p>
          </div>
          <div class="card-content">
            <form id="emailForm" style="display: flex; flex-direction: column">
              <!-- Email field -->
              <div class="float-field" style="order: 1">
                <input
                  type="email"
                  id="email"
                  name="email"
                  autocomplete="email"
                  placeholder=" "
                />
                <label for="email">Email address</label>
                <button
                  type="button"
                  class="email-clear-btn"
                  id="emailClearBtn"
                  aria-label="Clear email"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 16 16"
                  >
                    <path
                      fill="currentColor"
                      fill-rule="evenodd"
                      d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16M4.22 4.22a.75.75 0 0 1 1.06 0L8 6.94l2.72-2.72a.75.75 0 1 1 1.06 1.06L9.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L8 9.06l-2.72 2.72a.75.75 0 0 1-1.06-1.06L6.94 8L4.22 5.28a.75.75 0 0 1 0-1.06"
                      clip-rule="evenodd"
                    />
                  </svg>
                </button>
              </div>
              <div
                class="error-row"
                id="emailError"
                style="order: 2; margin: -8px 0 8px 6px"
              >
                <svg width="13" height="13" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" fill="var(--accent-red)" />
                  <line
                    x1="12"
                    y1="8"
                    x2="12"
                    y2="13"
                    stroke="white"
                    stroke-width="2.2"
                    stroke-linecap="round"
                  />
                  <circle cx="12" cy="17" r="1.2" fill="white" />
                </svg>
                <span>Please enter a valid email address</span>
              </div>
              <button
                type="submit"
                class="btn-default"
                id="emailBtn"
                style="order: 6"
              >
                Continue
              </button>
            </form>

            <div class="divider"><span>OR</span></div>
            <div class="social-buttons">
              <button class="social-btn" id="googleBtn">
                <img src="/assets/images/google.svg" alt="Google" /> Continue
                with Google
              </button>
            </div>
            <div class="social-buttons">
              <button class="social-btn" id="facebookBtn">
                <img src="/assets/images/facebook.svg" alt="Facebook" />
                Continue with Facebook
              </button>
            </div>
          </div>
          <div class="navbar-links">
            <a href="#">Terms of Service</a><span>|</span
            ><a href="#">Privacy Policy</a>
          </div>
        </div>
      </div>
    </div>

    <script src="/scripts/utils/app_settings.js"></script>
    <script src="/scripts/utils/switcher.js"></script>
    <script src="/scripts/utils/prefill_from_app.js"></script>

    <script>
      // ── Theme ──────────────────────────────────────────────────────────────
      let currentTheme = "system";
      function getSystemTheme() {
        return window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }
      function setTheme(theme) {
        const applyDark = () => {
          document.body.classList.add("dark");
          updateAutofill(true);
        };
        const applyLight = () => {
          document.body.classList.remove("dark");
          updateAutofill(false);
        };
        if (theme === "dark") {
          currentTheme = "dark";
          applyDark();
        } else if (theme === "light") {
          currentTheme = "light";
          applyLight();
        } else {
          currentTheme = "system";
          getSystemTheme() === "dark" ? applyDark() : applyLight();
        }
      }
      function updateAutofill(isDark) {
        let el = document.getElementById("autofillStyle");
        if (!el) {
          el = document.createElement("style");
          el.id = "autofillStyle";
          document.head.appendChild(el);
        }
        const bg = isDark ? "#1e293b" : "#ffffff";
        const text = isDark ? "#f1f5f9" : "#1a2c3e";
        el.textContent = `input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px ${bg} inset!important;-webkit-text-fill-color:${text}!important;}`;
      }
      document.getElementById("themeToggle").addEventListener("click", () => {
        const eff = currentTheme === "system" ? getSystemTheme() : currentTheme;
        setTheme(eff === "dark" ? "light" : "dark");
      });
      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", () => {
          if (currentTheme === "system") setTheme("system");
        });
      setTheme("system");

      // ── State ──────────────────────────────────────────────────────────────
      const _errorTimers = {};

      // ── Helpers ────────────────────────────────────────────────────────────
      function isValidEmail(e) {
        return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(e);
      }

      function showErrorRow(id, show, msg) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle("show", show);
        if (msg) {
          const s = el.querySelector("span");
          if (s) s.textContent = msg;
        }
        clearTimeout(_errorTimers[id]);
        if (show)
          _errorTimers[id] = setTimeout(
            () => el.classList.remove("show"),
            10000,
          );
      }
      function setInputError(id, isError) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle("error", isError);
      }
      function shakeField(el) {
        if (!el) return;
        el.classList.remove("shake");
        void el.offsetWidth;
        el.classList.add("shake");
        setTimeout(() => el.classList.remove("shake"), 350);
      }

      let toastTimer;
      function showToast(msg) {
        const t = document.getElementById("toastMsg");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
      }

      // ── Email clear button ─────────────────────────────────────────────────
      const _emailInput = document.getElementById("email");
      const _emailClearBtn = document.getElementById("emailClearBtn");
      function _updateClearBtn() {
        _emailClearBtn.classList.toggle(
          "visible",
          _emailInput.value.length > 0,
        );
      }
      _emailInput.addEventListener("input", () => {
        showErrorRow("emailError", false);
        setInputError("email", false);
        _updateClearBtn();
      });
      _emailClearBtn.addEventListener("click", () => {
        _emailInput.value = "";
        _emailInput.focus();
        _updateClearBtn();
        showErrorRow("emailError", false);
        setInputError("email", false);
      });

      // ── PANEL 1: Email check ───────────────────────────────────────────────
      document
        .getElementById("emailForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = _emailInput.value.trim();
          if (!email) {
            showErrorRow("emailError", true, "Please enter your email address");
            setInputError("email", true);
            shakeField(_emailInput.closest(".float-field"));
            return;
          }
          if (!isValidEmail(email)) {
            showErrorRow(
              "emailError",
              true,
              "Please enter a valid email address",
            );
            setInputError("email", true);
            shakeField(_emailInput.closest(".float-field"));
            return;
          }

          const btn = document.getElementById("emailBtn");
          btn.innerHTML = '<span class="btn-spinner"></span> Checking…';
          btn.disabled = true;

          try {
            const res = await fetch("/api/user?action=check-email", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });
            const data = await res.json();
            btn.innerHTML = "Continue";
            btn.disabled = false;

            const isApp = new URLSearchParams(location.search).get("app") || "";

            if (data.exists) {
              Switcher.go("/password", { email, ...(isApp && { app: isApp }) });
            } else {
              Switcher.go("/password", {
                email,
                isNew: "true",
                ...(isApp && { app: isApp }),
              });
            }
          } catch {
            btn.innerHTML = "Continue";
            btn.disabled = false;
            showErrorRow(
              "emailError",
              true,
              "Connection error. Please try again.",
            );
            shakeField(_emailInput.closest(".float-field"));
          }
        });

      // ── Social buttons ─────────────────────────────────────────────────────
      document.getElementById("googleBtn").addEventListener("click", () => {
        const isApp = new URLSearchParams(location.search).get("app") || "";
        const hint = new URLSearchParams(location.search).get("email") || "";

        const params = new URLSearchParams();
        if (hint) params.set("login_hint", hint);
        if (isApp) params.set("state", isApp);

        window.location.href = "/api/auth/google?" + params.toString();
      });
      document
        .getElementById("facebookBtn")
        .addEventListener("click", () =>
          showToast("Facebook sign in - Demo mode"),
        );

      // ── Brand mobile JS sync ───────────────────────────────────────────────
      function updateBrandVisibility() {
        const isMobile = window.innerWidth <= 767;
        const brandTop = document.getElementById("brandTop");
        const brandMobile = document.querySelector(".brand-mobile");
        if (brandTop) brandTop.style.display = isMobile ? "none" : "";
        if (brandMobile) brandMobile.style.display = isMobile ? "flex" : "none";
      }
      updateBrandVisibility();
      window.addEventListener("resize", updateBrandVisibility);
    </script>
  </body>
</html>
